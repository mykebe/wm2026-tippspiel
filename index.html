<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">WM-Tippspiel</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/logo.png" id="nav-logo" class="nav-logo" alt="Logo" />
    </div>
    <nav id="nav" class="nav hidden">
      <a href="#spiele">Tipps</a>
      <a href="#turnierbaum">Tabelle</a>
      <a href="#teilnehmer">Andere Tipps</a>
      <a href="#admin" id="nav-admin" class="hidden">Admin</a>
    </nav>
    <div id="user-area" class="user-area">
      <button id="account-btn" class="account-trigger hidden" aria-label="Account-Einstellungen">
        <span id="user-name"></span>
        <span class="account-gear">⚙</span>
      </button>
      <button id="logout-btn" class="link hidden">Abmelden</button>
    </div>
    <button id="burger-btn" class="burger hidden" aria-label="Menü öffnen">
      <span></span><span></span><span></span>
    </button>
    <div id="burger-menu" class="burger-menu hidden">
      <a href="#admin" id="burger-admin" class="hidden">Admin</a>
      <button id="burger-name" class="burger-name">Mein Account</button>
      <button id="burger-logout" class="link">Abmelden</button>
    </div>
  </header>

  <main id="app">
    <div id="loading" class="empty">Lade…</div>
  </main>

  <div id="modal-root"></div>

  <footer class="site-footer">
    Bei Problemen bitte die Seite neu laden oder
    <button type="button" id="feedback-link" class="footer-link">hier klicken</button>
  </footer>

  <!-- Feedback-Modal -->
  <template id="tpl-feedback-modal">
    <div class="modal-backdrop">
      <div class="modal card">
        <h2 class="modal-title">Nachricht senden</h2>
        <p class="modal-meta">Beschreibe kurz dein Problem oder Feedback.</p>
        <label class="field">
          <span>Nachricht</span>
          <textarea class="feedback-message" rows="5" placeholder="Deine Nachricht…" required></textarea>
        </label>
        <p class="error modal-error"></p>
        <p class="success modal-success"></p>
        <div class="modal-actions">
          <button type="button" class="link cancel-btn">Abbrechen</button>
          <button type="button" class="primary send-btn">Senden</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Login -->
  <template id="tpl-login">
    <div class="auth-split">
      <div class="auth-left">
        <video class="auth-video" src="/worldcup.mp4" autoplay muted loop playsinline></video>
        <div class="auth-video-overlay"></div>
        <img src="/logo_white.png" class="auth-logo" alt="Logo" />
        <h1 class="auth-title">WM-Tippspiel 2026</h1>
      </div>
      <div class="auth-right">
        <h2 class="auth-form-title">Registriere dich und sei der Beste... bei den Lebensräumen ;)</h2>
        <div class="tabs auth-tabs">
          <button class="tab" data-mode="login">Anmelden</button>
          <button class="tab active" data-mode="register">Registrieren</button>
        </div>
        <form id="auth-form" class="form">
          <label class="field name-field hidden">
            <span>Name</span>
            <input name="name" type="text" placeholder="Dein Name" autocomplete="name" />
          </label>
          <label class="field">
            <span>E-Mail</span>
            <input name="email" type="email" placeholder="Deine Lebensräume-Email" required autocomplete="email" />
          </label>
          <label class="field">
            <span>Passwort</span>
            <input name="password" type="password" placeholder="Beliebiges Passwort" minlength="6" autocomplete="current-password" />
          </label>
          <button type="submit" class="primary" style="margin-top:6px">Anmelden</button>
          <p id="auth-error" class="error"></p>
        </form>
      </div>
    </div>
  </template>

  <!-- Leaderboard (Top 5) -->
  <template id="tpl-leaderboard">
    <section class="card leaderboard-card">
      <h2>Tabelle – Top 5</h2>
      <ol class="leaderboard"></ol>
    </section>
  </template>

  <!-- Spiele-Karte -->
  <template id="tpl-spiel-card">
    <button type="button" class="spiel-card">
      <div class="sc-meta">
        <div class="sc-meta-left">
          <span class="sc-date"></span>
          <span class="sc-timer"></span>
        </div>
        <span class="sc-tip-label"></span>
      </div>
      <div class="sc-body">
        <span class="sc-team sc-home"></span>
        <div class="sc-tip-box">
          <div class="sc-tip-score"></div>
        </div>
        <span class="sc-team sc-away"></span>
      </div>
    </button>
  </template>

  <!-- Bracket-Match-Karte -->
  <template id="tpl-bracket-match">
    <button type="button" class="bracket-match">
      <div class="bm-meta"></div>
      <div class="bm-row">
        <span class="bm-team bm-home"></span>
        <span class="bm-score"></span>
        <span class="bm-team bm-away"></span>
      </div>
      <div class="bm-tip"></div>
    </button>
  </template>

  <!-- Tipp-Modal -->
  <template id="tpl-bet-modal">
    <div class="modal-backdrop">
      <div class="modal card">
        <h2 class="modal-title"></h2>
        <p class="modal-meta"></p>
        <div class="bet-row">
          <span class="team team-home"></span>
          <input class="score" type="number" min="0" max="20" inputmode="numeric" />
          <span>:</span>
          <input class="score" type="number" min="0" max="20" inputmode="numeric" />
          <span class="team team-away"></span>
        </div>
        <p class="error modal-error"></p>
        <div class="modal-actions">
          <button type="button" class="link cancel-btn">Abbrechen</button>
          <button type="button" class="primary save-btn">Tipp speichern</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Account-Modal -->
  <template id="tpl-account-modal">
    <div class="modal-backdrop">
      <div class="modal card">
        <h2 class="modal-title">Mein Account</h2>
        <p class="modal-meta account-email"></p>
        <div class="account-stats">
          <div class="account-stat"><span class="account-stat-label">Punkte</span><span class="account-stat-value account-points">–</span></div>
          <div class="account-stat"><span class="account-stat-label">Rang</span><span class="account-stat-value account-rank">–</span></div>
          <div class="account-stat"><span class="account-stat-label">Tipps abgegeben</span><span class="account-stat-value account-completion">–</span></div>
          <div class="account-stat"><span class="account-stat-label">Volltreffer</span><span class="account-stat-value account-exact">–</span></div>
        </div>
        <hr class="account-divider" />
        <p class="modal-meta">Passwort vergessen? Wir senden dir einen Reset-Link per E-Mail.</p>
        <p class="error modal-error"></p>
        <p class="success modal-success"></p>
        <div class="modal-actions">
          <button type="button" class="link cancel-btn">Schließen</button>
          <button type="button" class="primary reset-pw-btn">Passwort zurücksetzen</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Gruppen-Karte -->
  <template id="tpl-group-card">
    <article class="card group-card">
      <h3 class="group-title"></h3>
      <table class="group-table">
        <thead>
          <tr><th>#</th><th class="t">Team</th><th>Sp</th><th>S</th><th>U</th><th>N</th><th>Tore</th><th>Diff</th><th>Pkt</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="group-matches"></div>
    </article>
  </template>

  <script type="module" src="/app.js"></script>
</body>
</html>
